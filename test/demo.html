<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sixel Display Demo</title>
    <style>
      body {
        margin: 2rem auto;
        max-width: 42rem;
        font: 18px/1.5 Georgia, serif;
        color: #241c12;
        background: linear-gradient(180deg, #fff9e8 0%, #f7f0d8 100%);
      }

      h1 {
        margin-bottom: 0.5rem;
      }

      figure {
        margin: 2rem 0;
        padding: 1rem;
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid #d8c38a;
      }

      img {
        display: block;
        max-width: 256px;
      }
    </style>
  </head>
  <body>
    <h1>Sixel Display HTML Demo</h1>
    <p>This page exercises <code>eww</code> plus <code>shr-put-image</code>.</p>
    <figure>
      <img src="smiley.png" alt="Smiley face test image" />
      <figcaption>Generated PNG fixture.</figcaption>
    </figure>
  </body>
</html>
